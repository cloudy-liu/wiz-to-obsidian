<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiz To Obsidian Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    :root {
      --canvas: #E8E6DD;
      --paper: #FAF9F5;
      --paper-soft: #F6F3EC;
      --ink: #141413;
      --text: #3D3C38;
      --muted: #6F6C65;
      --line: #9A9991;
      --line-soft: #C9C3B8;
      --neutral-fill: #EDEAE3;
      --neutral-stroke: #9A9991;
      --frontend-fill: #E0E0F0;
      --frontend-stroke: #8585DD;
      --backend-fill: #D8E8D8;
      --backend-stroke: #76B985;
      --data-fill: #E4EEF4;
      --data-stroke: #6A9BCC;
      --cloud-fill: #F0DED7;
      --cloud-stroke: #D87858;
      --security-fill: #F3E4DA;
      --security-stroke: #C88E6A;
      --event-fill: #E6D7B4;
      --event-stroke: #BFA777;
      --font-laper: Montserrat, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::selection {
      background: #E6D7B4;
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      padding: 32px;
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--font-laper);
      letter-spacing: 0;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
    }

    .header {
      position: relative;
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      color: var(--ink);
      font-size: 42px;
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 720px;
      margin: 10px auto 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 400;
    }

    .toolbar {
      position: absolute;
      top: 4px;
      right: 0;
      display: inline-flex;
      align-items: center;
      z-index: 10;
    }

    .toolbar-actions {
      position: absolute;
      top: 0;
      left: calc(100% + 8px);
      display: none;
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
      width: 176px;
      padding: 6px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(250, 249, 245, 0.96);
      box-shadow: 0 12px 30px rgba(20, 20, 19, 0.10);
      text-align: left;
    }

    .toolbar.expanded .toolbar-actions {
      display: flex;
    }

    .toolbar.toolbar-flip .toolbar-actions {
      right: calc(100% + 8px);
      left: auto;
    }

    .toolbar-toggle,
    .toolbar-actions button {
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: var(--paper);
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .toolbar-toggle {
      padding: 9px 13px;
    }

    .toolbar-actions button {
      width: 100%;
      padding: 9px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      text-align: left;
      white-space: nowrap;
    }

    .toolbar-toggle:hover,
    .toolbar-actions button:hover {
      border-color: var(--line);
      color: var(--ink);
      background: #FFFFFF;
    }

    .diagram-container {
      overflow-x: auto;
      padding: 24px;
      border: 1px solid var(--line-soft);
      border-radius: 28px;
      background: var(--paper);
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1200px;
      font-family: var(--font-laper);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 760px) {
      body {
        padding: 18px;
      }

      .header h1 {
        font-size: 30px;
        padding-right: 84px;
        text-align: left;
      }

      .toolbar {
        top: 0;
        right: 0;
      }

      .toolbar-actions {
        position: fixed;
        top: auto;
        right: 18px;
        bottom: 18px;
        left: 18px;
        width: auto;
      }

      .toolbar.toolbar-flip .toolbar-actions {
        right: 18px;
        left: 18px;
      }

      .diagram-container {
        padding: 16px;
        border-radius: 22px;
      }
    }

    @media print {
      body {
        background: var(--canvas);
        padding: 16px;
      }

      .toolbar {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <script>
    function closeExportMenus(exceptMenu) {
      document.querySelectorAll('.toolbar.expanded').forEach((menu) => {
        if (menu === exceptMenu) return;
        menu.classList.remove('expanded', 'toolbar-flip');
        menu.querySelector('.toolbar-toggle')?.setAttribute('aria-expanded', 'false');
      });
    }

    function positionExportMenu(menu) {
      const actions = menu.querySelector('.toolbar-actions');
      menu.classList.remove('toolbar-flip');
      if (actions.getBoundingClientRect().right > window.innerWidth - 8) {
        menu.classList.add('toolbar-flip');
      }
    }

    function toggleExportMenu(btn) {
      const menu = btn.closest('.toolbar');
      const shouldOpen = !menu.classList.contains('expanded');
      closeExportMenus(menu);
      menu.classList.toggle('expanded', shouldOpen);
      btn.setAttribute('aria-expanded', String(shouldOpen));
      if (shouldOpen) positionExportMenu(menu);
    }

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.toolbar')) {
        closeExportMenus();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeExportMenus();
      }
    });

    async function captureReport() {
      const el = document.getElementById('report-container');
      const r = el.getBoundingClientRect();
      const pad = 32;
      return html2canvas(document.body, {
        backgroundColor: '#E8E6DD',
        scale: 2,
        useCORS: true,
        ignoreElements: (e) => e.classList && e.classList.contains('toolbar'),
        x: r.left + window.scrollX - pad,
        y: r.top + window.scrollY - pad,
        width: r.width + pad * 2,
        height: r.height + pad * 2
      });
    }

    async function copyAsImage(btn) {
      const orig = btn.textContent;
      try {
        const canvas = await captureReport();
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = 'Copied';
      } catch (e) {
        btn.textContent = 'Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }

    async function downloadPNG(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Preparing';
      try {
        const canvas = await captureReport();
        const link = document.createElement('a');
        link.download = 'diagram.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.textContent = 'Done';
      } catch (e) {
        btn.textContent = 'Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }

    async function downloadPDF(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Preparing';
      try {
        const canvas = await captureReport();
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('diagram.pdf');
        btn.textContent = 'Done';
      } catch (e) {
        btn.textContent = 'Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }

    function xmlEscape(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    const CLOUDY_DRAWIO_EXPORTER_VERSION = '2026.06.28.1';

    function directChildren(el, tagName) {
      return Array.from(el.children).filter((child) => child.tagName.toLowerCase() === tagName);
    }

    function directTag(el) {
      return el.tagName.toLowerCase();
    }

    function attrNumber(el, name, fallback = 0) {
      return numberValue(el.getAttribute(name), fallback);
    }

    function drawioId(el, index) {
      const raw = el.dataset.drawioId || `${el.dataset.drawioType || 'cell'}-${index}`;
      return raw.replace(/[^a-zA-Z0-9_-]/g, '-');
    }

    function cellStyle(parts) {
      return parts.filter(Boolean).join(';') + ';';
    }

    function drawioRoleStyle(el) {
      const role = el.dataset?.drawioRole;
      return role ? `cloudyRole=${role.replace(/[^a-zA-Z0-9_-]/g, '-')}` : '';
    }

    function drawioIgnored(el) {
      return el.dataset?.drawioIgnore === 'true';
    }

    function drawioNumber(value) {
      const rounded = Math.round(Number(value) * 100) / 100;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded);
    }

    function numberValue(value, fallback = 0) {
      const parsed = Number.parseFloat(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function svgViewBox(svg) {
      const values = (svg.getAttribute('viewBox') || '0 0 1000 620')

        : semanticContainerRole(el)
          ? ['container=1', 'collapsible=0', 'recursiveResize=0', 'align=left', 'verticalAlign=top', 'spacing=8', 'fontColor=#3D3C38', 'fontSize=13']
        : ['align=center', 'verticalAlign=middle', 'spacing=8', 'fontColor=#3D3C38', 'fontSize=15'];

      const id = drawioId(el, index);
      const style = cellStyle([...baseStyle, ...typeStyle]);
      const x = attrNumber(rect, 'x');
      const y = attrNumber(rect, 'y');
      const width = attrNumber(rect, 'width');
      const height = attrNumber(rect, 'height');

      return `<mxCell id="${xmlEscape(id)}" value="${xmlEscape(label)}" style="${xmlEscape(style)}" vertex="1" parent="1"><mxGeometry x="${drawioNumber(x - origin.x)}" y="${drawioNumber(y - origin.y)}" width="${width}" height="${height}" as="geometry"/></mxCell>`;
    }

    const CURVE_SAMPLE_STEPS = 8;

    function isPathCommand(token) {
      return /^[a-zA-Z]$/.test(token);
    }

    function pathTokens(pathData) {
      return pathData.match(/[AaCcHhLlMmQqSsTtVvZz]|[-+]?(?:\d*\.\d+|\d+\.?)(?:[eE][-+]?\d+)?/g) || [];
    }

    function addPathPoint(points, point) {
      if (Number.isFinite(point.x) && Number.isFinite(point.y)) points.push(point);
    }

    function pathPoint(x, y, current, relative) {
      return {
        x: relative ? current.x + x : x,
        y: relative ? current.y + y : y
      };
    }

    function reflectPathPoint(point, around) {
      return {
        x: around.x * 2 - point.x,
        y: around.y * 2 - point.y
      };
    }

    function cubicBezierPoint(start, controlA, controlB, end, t) {
      const mt = 1 - t;
      return {
        x: mt ** 3 * start.x + 3 * mt ** 2 * t * controlA.x + 3 * mt * t ** 2 * controlB.x + t ** 3 * end.x,
        y: mt ** 3 * start.y + 3 * mt ** 2 * t * controlA.y + 3 * mt * t ** 2 * controlB.y + t ** 3 * end.y
      };
    }

    function quadraticBezierPoint(start, control, end, t) {
      const mt = 1 - t;
      return {
        x: mt ** 2 * start.x + 2 * mt * t * control.x + t ** 2 * end.x,
        y: mt ** 2 * start.y + 2 * mt * t * control.y + t ** 2 * end.y
      };
    }

    function sampleCurve(points, pointAt) {
      for (let step = 1; step <= CURVE_SAMPLE_STEPS; step += 1) {
        addPathPoint(points, pointAt(step / CURVE_SAMPLE_STEPS));
      }
    }

    function pointsFromPathData(pathData) {
      const tokens = pathTokens(pathData);
      const points = [];
      let index = 0;
      let command = '';
      let current = { x: 0, y: 0 };
      let subpathStart = current;
      let lastCubicControl = null;
      let lastQuadraticControl = null;

      const hasNumber = () => index < tokens.length && !isPathCommand(tokens[index]);
      const readNumber = () => Number(tokens[index++]);

      while (index < tokens.length) {
        if (isPathCommand(tokens[index])) command = tokens[index++];
        if (!command) break;

        const upper = command.toUpperCase();
        const relative = command !== upper;

        if (upper === 'M') {
          let first = true;
          while (hasNumber()) {
            const point = pathPoint(readNumber(), readNumber(), current, relative);
            current = point;
            if (first) subpathStart = point;
            addPathPoint(points, point);
            first = false;
          }
          command = relative ? 'l' : 'L';
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        if (upper === 'L') {
          while (hasNumber()) {
            current = pathPoint(readNumber(), readNumber(), current, relative);
            addPathPoint(points, current);
          }
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        if (upper === 'H') {
          while (hasNumber()) {
            const x = readNumber();
            current = { x: relative ? current.x + x : x, y: current.y };
            addPathPoint(points, current);
          }
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        if (upper === 'V') {
          while (hasNumber()) {
            const y = readNumber();
            current = { x: current.x, y: relative ? current.y + y : y };
            addPathPoint(points, current);
          }
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        if (upper === 'C') {
          while (hasNumber()) {
            const start = current;
            const controlA = pathPoint(readNumber(), readNumber(), current, relative);
            const controlB = pathPoint(readNumber(), readNumber(), current, relative);
            const end = pathPoint(readNumber(), readNumber(), current, relative);
            sampleCurve(points, (t) => cubicBezierPoint(start, controlA, controlB, end, t));
            current = end;
            lastCubicControl = controlB;
            lastQuadraticControl = null;
          }
          continue;
        }

        if (upper === 'S') {
          while (hasNumber()) {
            const start = current;
            const controlA = lastCubicControl ? reflectPathPoint(lastCubicControl, current) : current;
            const controlB = pathPoint(readNumber(), readNumber(), current, relative);
            const end = pathPoint(readNumber(), readNumber(), current, relative);
            sampleCurve(points, (t) => cubicBezierPoint(start, controlA, controlB, end, t));
            current = end;
            lastCubicControl = controlB;
            lastQuadraticControl = null;
          }
          continue;
        }

        if (upper === 'Q') {
          while (hasNumber()) {
            const start = current;
            const control = pathPoint(readNumber(), readNumber(), current, relative);
            const end = pathPoint(readNumber(), readNumber(), current, relative);
            sampleCurve(points, (t) => quadraticBezierPoint(start, control, end, t));
            current = end;
            lastQuadraticControl = control;
            lastCubicControl = null;
          }
          continue;
        }

        if (upper === 'T') {
          while (hasNumber()) {
            const start = current;
            const control = lastQuadraticControl ? reflectPathPoint(lastQuadraticControl, current) : current;
            const end = pathPoint(readNumber(), readNumber(), current, relative);
            sampleCurve(points, (t) => quadraticBezierPoint(start, control, end, t));
            current = end;
            lastQuadraticControl = control;
            lastCubicControl = null;
          }
          continue;
        }

        if (upper === 'A') {
          while (hasNumber()) {
            readNumber();
            readNumber();
            readNumber();
            readNumber();
            readNumber();
            current = pathPoint(readNumber(), readNumber(), current, relative);
            addPathPoint(points, current);
          }
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        if (upper === 'Z') {
          current = subpathStart;
          addPathPoint(points, current);
          lastCubicControl = null;
          lastQuadraticControl = null;
          continue;
        }

        break;
      }

      return points;
    }

    function pointsFromShape(shape) {
      const tag = directTag(shape);
      if (tag === 'line') {
        return [
          { x: attrNumber(shape, 'x1'), y: attrNumber(shape, 'y1') },
          { x: attrNumber(shape, 'x2'), y: attrNumber(shape, 'y2') }
        ];
      }

      if (tag === 'polyline') {
        return (shape.getAttribute('points') || '')
          .trim()
          .split(/\s+/)
          .map((pair) => pair.split(',').map(Number))
          .filter(([x, y]) => Number.isFinite(x) && Number.isFinite(y))
          .map(([x, y]) => ({ x, y }));
      }

      if (tag === 'path') return pointsFromPathData(shape.getAttribute('d') || '');

      return [];
    }

    function shapeUsesCurveCommand(shape) {
      return directTag(shape) === 'path' && /[CQSTcqst]/.test(shape.getAttribute('d') || '');
    }

    function edgeMarkerStyle(shape) {
      const hasStartMarker = shape.hasAttribute('marker-start');
      const hasEndMarker = shape.hasAttribute('marker-end');
      return [
        hasStartMarker ? 'startArrow=open' : 'startArrow=none',
        hasStartMarker ? 'startFill=0' : '',
        hasEndMarker ? 'endArrow=open' : 'endArrow=none',
        hasEndMarker ? 'endFill=0' : ''
      ];
    }

    function edgeTerminalAttributes(el) {
      const source = (el.dataset.drawioSource || '').trim();
      const target = (el.dataset.drawioTarget || '').trim();
      const connect = (el.dataset.drawioConnect || '').trim().toLowerCase() === 'true';
      const attrs = [];

      if (source) attrs.push(`data-drawio-source="${xmlEscape(source)}"`);
      if (target) attrs.push(`data-drawio-target="${xmlEscape(target)}"`);
      if (connect && source) attrs.push(`source="${xmlEscape(source)}"`);
      if (connect && target) attrs.push(`target="${xmlEscape(target)}"`);

      return attrs.length ? ` ${attrs.join(' ')}` : '';
    }

    function edgeLabelTextElement(el, shape) {
      const directText = visibleTextChildren(el)[0];
      if (directText) return directText;

      const label = (el.dataset.drawioLabel || '').trim();
      if (!label) return null;

      const svg = el.ownerSVGElement || el.closest('svg');
      if (!svg) return null;

      const points = pointsFromShape(shape);
      if (points.length < 2) return null;

      const mid = {
        x: (points[0].x + points[points.length - 1].x) / 2,
        y: (points[0].y + points[points.length - 1].y) / 2
      };

      return Array.from(svg.querySelectorAll('text'))
        .filter((text) => !text.dataset.drawioType)
        .filter((text) => !text.closest?.('[data-drawio-type]'))
        .filter((text) => text.textContent.trim() === label)
        .sort((a, b) => {
          const da = (attrNumber(a, 'x') - mid.x) ** 2 + (attrNumber(a, 'y') - mid.y) ** 2;
          const db = (attrNumber(b, 'x') - mid.x) ** 2 + (attrNumber(b, 'y') - mid.y) ** 2;
          return da - db;
        })[0] || null;
    }

    function buildEdgeLabelCell(el, edgeId, text, origin = { x: 0, y: 0 }) {
      const labelText = text?.textContent.trim() || '';
      if (!labelText) return '';

      const fontSize = numberValue(el.dataset.drawioLabelSize || text.getAttribute('font-size'), 11);
      const fontWeight = el.dataset.drawioLabelWeight || text.getAttribute('font-weight') || '400';
      const align = textAlignFromAnchor(text);
      const estimatedWidth = Math.max(fontSize * 3, labelText.length * fontSize * 0.62);
      const width = numberValue(el.dataset.drawioLabelWidth || text.dataset?.drawioWidth, estimatedWidth);
      const height = numberValue(el.dataset.drawioLabelHeight || text.dataset?.drawioHeight, fontSize * 1.45);
      const textX = attrNumber(text, 'x');
      const textY = attrNumber(text, 'y');
      const hasExplicitX = Boolean(el.dataset.drawioLabelX || text.dataset?.drawioX);
      let x = numberValue(el.dataset.drawioLabelX || text.dataset?.drawioX, textX);
      if (!hasExplicitX) {
        if (align === 'center') x -= width / 2;
        if (align === 'right') x -= width;
      }
      const y = numberValue(el.dataset.drawioLabelY || text.dataset?.drawioY, textY - fontSize);
      const color = text.getAttribute('fill') || el.dataset.drawioLabelColor || '#6F6C65';
      const style = cellStyle([
        'text',
        'html=1',
        'strokeColor=none',
        'fillColor=none',
        'whiteSpace=wrap',
        'rounded=0',
        `align=${align}`,
        'verticalAlign=middle',
        'fontFamily=Montserrat',
        `fontSize=${fontSize}`,
        `fontColor=${color}`,
        `fontStyle=${fontStyleValueFromWeight(fontWeight)}`,
        drawioRoleStyle(el)
      ]);

      return `<mxCell id="${xmlEscape(edgeId)}-label" data-drawio-edge-label-for="${xmlEscape(edgeId)}" value="${xmlEscape(labelText)}" style="${xmlEscape(style)}" vertex="1" parent="1"><mxGeometry x="${drawioNumber(x - origin.x)}" y="${drawioNumber(y - origin.y)}" width="${drawioNumber(width)}" height="${drawioNumber(height)}" as="geometry"/></mxCell>`;
    }

    function buildEdgeCell(el, index, origin = { x: 0, y: 0 }) {
      const shape = firstDrawioShape(el, ['line', 'path', 'polyline']);
      if (!shape) return '';

      const points = pointsFromShape(shape);
      if (points.length < 2) return '';

      const labelTextElement = edgeLabelTextElement(el, shape);
      const labelText = labelTextElement ? '' : (el.dataset.drawioLabel || '');
      const label = xmlEscape(labelText);
      const labelFontSize = labelTextElement?.getAttribute('font-size') || '11';
      const labelFontColor = labelTextElement?.getAttribute('fill') || '#6F6C65';
      const labelFontWeight = labelTextElement?.getAttribute('font-weight') || '';
      const stroke = shape.getAttribute('stroke') || '#9A9991';
      const strokeWidth = shape.getAttribute('stroke-width') || '1.6';
      const curved = shapeUsesCurveCommand(shape);
      const id = drawioId(el, index);
      const translatedPoints = points.map((point) => ({
        x: point.x - origin.x,
        y: point.y - origin.y
      }));
      const start = translatedPoints[0];
      const end = translatedPoints[translatedPoints.length - 1];
      const waypoints = translatedPoints.slice(1, -1)
        .map((point) => `<mxPoint x="${drawioNumber(point.x)}" y="${drawioNumber(point.y)}"/>`)
        .join('');
      const waypointXml = waypoints ? `<Array as="points">${waypoints}</Array>` : '';
      const style = cellStyle([
        'edgeStyle=none',
        curved ? 'curved=1' : '',
        curved ? 'rounded=0' : 'rounded=1',
        'html=1',
        ...edgeMarkerStyle(shape),
        'fontFamily=Montserrat',
        `fontSize=${labelFontSize}`,
        `fontColor=${labelFontColor}`,
        `fontStyle=${fontStyleValueFromWeight(labelFontWeight)}`,
        `strokeColor=${stroke}`,
        `strokeWidth=${strokeWidth}`,
        ...drawioDashStyle(shape),
        drawioRoleStyle(el)
      ]);

      const edgeCell = `<mxCell id="${xmlEscape(id)}"${edgeTerminalAttributes(el)} value="${label}" style="${xmlEscape(style)}" edge="1" parent="1"><mxGeometry relative="1" as="geometry"><mxPoint x="${drawioNumber(start.x)}" y="${drawioNumber(start.y)}" as="sourcePoint"/><mxPoint x="${drawioNumber(end.x)}" y="${drawioNumber(end.y)}" as="targetPoint"/>${waypointXml}</mxGeometry></mxCell>`;
      return `${edgeCell}${buildEdgeLabelCell(el, id, labelTextElement, origin)}`;
    }

    function buildDrawioFromSvg(svg, options = {}) {
      const fallbackDocumentTitle = typeof document !== 'undefined' ? document.title : '';
      const title = options.title || svg.querySelector('title')?.textContent.trim() || fallbackDocumentTitle || 'Diagram';
      const viewBox = svgViewBox(svg);
      const offset = options.offset || {};
      const offsetX = numberValue(offset.x, 0);
      const offsetY = numberValue(offset.y, 0);
      const pageWidth = drawioNumber(numberValue(options.pageWidth, viewBox.width + offsetX));
      const pageHeight = drawioNumber(numberValue(options.pageHeight, viewBox.height + offsetY));
      const origin = { x: viewBox.x - offsetX, y: viewBox.y - offsetY };
      const prependCells = Array.isArray(options.prependCells) ? options.prependCells : [];
      const cells = ['<mxCell id="0"/>', '<mxCell id="1" parent="0"/>', ...prependCells];
      const coverageWarnings = auditDrawioCoverage(svg);

      if (coverageWarnings.length) {
        if (typeof options.onCoverageWarning === 'function') options.onCoverageWarning(coverageWarnings);
        if (options.strictCoverage !== false) {
          throw new Error(`Draw.io coverage audit failed:\n${coverageWarnings.join('\n')}`);
        }
      }

      Array.from(svg.querySelectorAll('[data-drawio-type]'))
        .filter((group) => !drawioIgnored(group))
        .forEach((group, index) => {
        if (group.dataset.drawioType === 'edge') {
          cells.push(buildEdgeCell(group, index + 2, origin));
          return;
        }

        if (group.dataset.drawioType === 'label') {
          cells.push(buildLabelCell(group, index + 2, origin));
          return;
        }

        if (group.dataset.drawioType === 'shape') {
          cells.push(buildShapeCell(group, index + 2, origin));
          return;
        }

        if (group.dataset.drawioType === 'component' || group.dataset.drawioType === 'boundary') {
          const id = drawioId(group, index + 2);
          const rect = firstDrawioShape(group, ['rect']);
          cells.push(buildBoxCell(group, index + 2, origin));
          if (rect) cells.push(...buildInternalPrimitiveCells(group, rect, id, origin));
        }
      });

      const model = `<mxGraphModel dx="${xmlEscape(pageWidth)}" dy="${xmlEscape(pageHeight)}" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="${xmlEscape(pageWidth)}" pageHeight="${xmlEscape(pageHeight)}" math="0" shadow="0"><root>${cells.filter(Boolean).join('')}</root></mxGraphModel>`;
      return `<?xml version="1.0" encoding="UTF-8"?><mxfile host="app.diagrams.net" agent="Cloudy Tech Diagrams" cloudyDrawioExporterVersion="${xmlEscape(CLOUDY_DRAWIO_EXPORTER_VERSION)}" modified="${new Date().toISOString()}" type="device"><diagram id="cloudy-tech-diagram" name="${xmlEscape(title)}">${model}</diagram></mxfile>`;
    }

    function reportText(root, selector) {
      return root.querySelector(selector)?.textContent.trim() || '';
    }

    function buildReportTextCell({ id, value, x, y, width, height, fontSize, fontColor, fontWeight }) {
      if (!value) return '';

      const style = cellStyle([
        'text',
        'html=1',
        'strokeColor=none',
        'fillColor=none',
        'whiteSpace=wrap',
        'rounded=0',
        'align=center',
        'verticalAlign=middle',
        'fontFamily=Montserrat',
        `fontSize=${fontSize}`,
        `fontColor=${fontColor}`,
        `fontStyle=${fontStyleValueFromWeight(fontWeight)}`,
        `cloudyRole=${id}`
      ]);

      return `<mxCell id="${xmlEscape(id)}" value="${xmlEscape(value)}" style="${xmlEscape(style)}" vertex="1" parent="1"><mxGeometry x="${drawioNumber(x)}" y="${drawioNumber(y)}" width="${drawioNumber(width)}" height="${drawioNumber(height)}" as="geometry"/></mxCell>`;
    }

    function buildReportHeaderCells(title, subtitle, pageWidth) {
      const subtitleInset = Math.min(80, Math.max(0, pageWidth * 0.08));
      return [
        buildReportTextCell({
          id: 'report-title',
          value: title,
          x: 0,
          y: 0,
          width: pageWidth,
          height: 52,
          fontSize: 42,
          fontColor: '#141413',
          fontWeight: '700'
        }),
        buildReportTextCell({
          id: 'report-subtitle',
          value: subtitle,
          x: subtitleInset,
          y: 58,
          width: pageWidth - (subtitleInset * 2),
          height: 24,
          fontSize: 15,
          fontColor: '#6F6C65',
          fontWeight: '400'
        })
      ].filter(Boolean);
    }

    function reportHeaderHeight(title, subtitle) {
      if (!title) return 0;
      return subtitle ? 104 : 72;
    }

    function buildDrawioReportFromDocument(root = document, options = {}) {
      const svg = root.querySelector('.diagram-container svg');
      if (!svg) throw new Error('Draw.io report export requires .diagram-container svg');

      const viewBox = svgViewBox(svg);
      const title = reportText(root, '.header h1');
      const subtitle = reportText(root, '.subtitle');
      const pageWidth = numberValue(options.pageWidth, viewBox.width);
      const headerHeight = reportHeaderHeight(title, subtitle);
      const headerCells = buildReportHeaderCells(title, subtitle, pageWidth);
      const prependCells = Array.isArray(options.prependCells) ? options.prependCells : [];

      return buildDrawioFromSvg(svg, {
        ...options,
        title: title || options.title,
        pageWidth,
        pageHeight: numberValue(options.pageHeight, viewBox.height + headerHeight),
        offset: { x: 0, y: headerHeight },
        prependCells: [...headerCells, ...prependCells]
      });
    }

    function downloadTextFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.download = filename;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }

    function downloadDrawio(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Preparing';
      try {
        const mxfile = buildDrawioReportFromDocument(document, {
          strictCoverage: false,
          onCoverageWarning: (warnings) => console.warn('Draw.io coverage audit warnings', warnings)
        });
        downloadTextFile('diagram.drawio', mxfile, 'application/xml');
        btn.textContent = 'Done';
      } catch (e) {
        console.warn('Draw.io export failed', e);
        btn.textContent = 'Failed';
      }
      setTimeout(() => btn.textContent = orig, 2000);
    }
  </script>
</body>
