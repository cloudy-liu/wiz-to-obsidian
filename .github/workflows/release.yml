name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            arch: x64
            binary_name: wiz2obs_cli.exe
          - os: macos-15-intel
            platform: macos
            arch: x64
            binary_name: wiz2obs_cli
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            binary_name: wiz2obs_cli

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytest
          pip install -e .

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name wiz2obs_cli src/wiz_to_obsidian/__main__.py

      - name: Set archive name
        id: archive
        shell: bash
        run: echo "name=wiz2obs_cli-${GITHUB_REF_NAME}_${{ matrix.platform }}_${{ matrix.arch }}.zip" >> "$GITHUB_OUTPUT"

      - name: Package artifact (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Copy-Item "dist\${{ matrix.binary_name }}" package\
          Copy-Item README.md package\
          Copy-Item LICENSE package\
          Compress-Archive -Path package\* -DestinationPath "release-artifacts\${{ steps.archive.outputs.name }}"

      - name: Package artifact (macOS / Linux)
        if: ${{ matrix.platform != 'windows' }}
        run: |
          mkdir -p package release-artifacts
          cp "dist/${{ matrix.binary_name }}" package/
          cp README.md package/
          cp LICENSE package/
          cd package
          zip -r "../release-artifacts/${{ steps.archive.outputs.name }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: release-artifacts/${{ steps.archive.outputs.name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: true
